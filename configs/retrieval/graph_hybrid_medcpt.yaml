name: graph_hybrid_medcpt
index_file: graph_hybrid_medcpt/graph_index.json

base_retriever: hybrid
graph_path: ${run.prep_data.out_dir}/medquad_graph.json

fusion: rrf
alpha: 0.6
cand_k: 50
rrf_k: 60
dense_backend: bi_encoder
query_model_name: ncbi/MedCPT-Query-Encoder
doc_model_name: ncbi/MedCPT-Article-Encoder
pooling: cls
normalize: true
query_max_length: 64
doc_max_length: 256
batch_size: 32
local_files_only: false

seed_k: 20
expand_k: 50
max_hops: 2
base_weight: 0.7
graph_weight: 0.3
hop_decay: 0.65

relation_weights:
  same_document_id: 1.0
  same_focus: 1.0
  same_cui: 0.9
  focus_synonym_match: 0.7
  question_type_boost: 0.2
  same_semantic_group: 0.075
