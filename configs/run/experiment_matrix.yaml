run_id: ${oc.env:EXPERIMENT_RUN_ID,medquad_full_remote}
output_root: artifacts/experiments
push_outputs: false

remote:
  artifact_dvc_remote: ${oc.env:ARTIFACT_DVC_REMOTE,artifact_s3}
  artifact_remote_uri: ${oc.env:ARTIFACT_REMOTE_URI,null}
  qdrant_url: ${oc.env:QDRANT_URL,http://localhost:6333}
  qdrant_api_key: ${oc.env:QDRANT_API_KEY,null}
  vllm_base_url: ${oc.env:VLLM_BASE_URL,null}
  vllm_api_key: ${oc.env:VLLM_API_KEY,null}
  llm_judge_base_url: ${oc.env:LLM_JUDGE_BASE_URL,null}
  llm_judge_api_key: ${oc.env:LLM_JUDGE_API_KEY,null}
  timeout_seconds: ${oc.decode:${oc.env:EXPERIMENT_PREFLIGHT_TIMEOUT_SECONDS,180}}

metrics:
  eval_ks: "1,3,5,10"
  primary_retrieval:
    - Hit@1
    - Hit@3
    - Hit@5
    - MRR@10
    - latency_p50_ms
    - latency_p95_ms
  secondary_retrieval:
    - NDCG@10
    - gold_retention@10
    - graph_expansion_size
    - graph_expansion_latency_ms

profiles:
  smoke:
    methods:
      - bm25
    retrieval_sweeps:
      hybrid_alpha: [0.6]
      hybrid_cand_k: [50]
      hybrid_rrf_k: [60]
      graph_seed_k: [20]
      graph_expand_k: [50]
      graph_max_hops: [2]
      graph_hop_decay: [0.65]
      graph_base_graph_weights:
        - [0.7, 0.3]
      rag_fusion_num_queries: [5]
      rag_fusion_rrf_k: [60]
      rag_fusion_include_original: [true]
    generation_sweeps:
      examples_limit: 5
      top_k: [5]
      retrieve_top_k: [20]
      use_reranker: [false]
      judge_mode: [heuristic]
  practical_remote:
    methods:
      - bm25
      - dense_qdrant
      - hybrid_qdrant
      - rag_fusion_bm25
      - rag_fusion_qdrant
      - graph_bm25
      - graph_qdrant
      - graph_hybrid_qdrant
      - medcpt_zero_shot
      - medcpt_trained
      - hybrid_medcpt_trained
      - graph_hybrid_medcpt_trained
    retrieval_sweeps:
      hybrid_alpha: [0.4, 0.6]
      hybrid_cand_k: [50]
      hybrid_rrf_k: [60]
      graph_seed_k: [20]
      graph_expand_k: [50]
      graph_max_hops: [2]
      graph_hop_decay: [0.65]
      graph_base_graph_weights:
        - [0.7, 0.3]
      rag_fusion_num_queries: [3, 5]
      rag_fusion_rrf_k: [60]
      rag_fusion_include_original: [true]
    generation_sweeps:
      examples_limit: 0
      top_k: [5]
      retrieve_top_k: [20]
      use_reranker: [false, true]
      judge_mode: [heuristic]
  full_remote:
    methods:
      - bm25
      - dense_qdrant
      - hybrid_qdrant
      - rag_fusion_bm25
      - rag_fusion_qdrant
      - graph_bm25
      - graph_qdrant
      - graph_hybrid_qdrant
      - medcpt_zero_shot
      - medcpt_trained
      - hybrid_medcpt_trained
      - graph_hybrid_medcpt_trained
    retrieval_sweeps:
      hybrid_alpha: [0.2, 0.4, 0.6, 0.8]
      hybrid_cand_k: [20, 50, 100]
      hybrid_rrf_k: [20, 60, 100]
      graph_seed_k: [10, 20, 50]
      graph_expand_k: [20, 50, 100]
      graph_max_hops: [1, 2]
      graph_hop_decay: [0.5, 0.65, 0.8]
      graph_base_graph_weights:
        - [0.8, 0.2]
        - [0.7, 0.3]
        - [0.5, 0.5]
      rag_fusion_num_queries: [3, 5, 8]
      rag_fusion_rrf_k: [20, 60, 100]
      rag_fusion_include_original: [true, false]
    generation_sweeps:
      examples_limit: 0
      top_k: [3, 5, 8]
      retrieve_top_k: [20, 50]
      use_reranker: [false, true]
      judge_mode: [heuristic, llm]

methods:
  bm25:
    retrieval: bm25
    run_name: bm25
    overrides: []
  dense_qdrant:
    retrieval: dense
    run_name: dense_qdrant
    overrides:
      - retrieval.vector_backend=qdrant
  hybrid_qdrant:
    retrieval: hybrid
    run_name: hybrid_qdrant
    overrides:
      - retrieval.dense_backend=qdrant
      - run.retrieval_index.dense_backend=qdrant
  rag_fusion_bm25:
    retrieval: rag_fusion_bm25
    run_name: rag_fusion_bm25
    base_retriever: bm25
    overrides:
      - retrieval.base_retriever=bm25
  rag_fusion_qdrant:
    retrieval: rag_fusion_dense
    run_name: rag_fusion_qdrant
    base_retriever: dense
    overrides:
      - retrieval.vector_backend=qdrant
      - retrieval.base_retriever=dense
  graph_bm25:
    retrieval: graph_bm25
    run_name: graph_bm25
    base_retriever: bm25
    overrides:
      - retrieval.base_retriever=bm25
  graph_qdrant:
    retrieval: graph_bm25
    run_name: graph_qdrant
    base_retriever: dense
    overrides:
      - retrieval.base_retriever=dense
      - retrieval.vector_backend=qdrant
  graph_hybrid_qdrant:
    retrieval: graph_hybrid
    run_name: graph_hybrid_qdrant
    base_retriever: hybrid
    overrides:
      - retrieval.base_retriever=hybrid
      - retrieval.dense_backend=qdrant
      - run.retrieval_index.dense_backend=qdrant
  medcpt_zero_shot:
    retrieval: medcpt
    run_name: medcpt_zero_shot
    overrides: []
  medcpt_trained:
    retrieval: medcpt
    run_name: medcpt_trained
    overrides:
      - retrieval.query_model_name=artifacts/retriever/medcpt-bi-encoder-pilot/query_encoder
      - retrieval.doc_model_name=artifacts/retriever/medcpt-bi-encoder-pilot/doc_encoder
      - run.retrieval_index.query_model=artifacts/retriever/medcpt-bi-encoder-pilot/query_encoder
      - run.retrieval_index.doc_model=artifacts/retriever/medcpt-bi-encoder-pilot/doc_encoder
  hybrid_medcpt_trained:
    retrieval: hybrid_medcpt
    run_name: hybrid_medcpt_trained
    overrides:
      - retrieval.query_model_name=artifacts/retriever/medcpt-bi-encoder-pilot/query_encoder
      - retrieval.doc_model_name=artifacts/retriever/medcpt-bi-encoder-pilot/doc_encoder
      - run.retrieval_index.query_model=artifacts/retriever/medcpt-bi-encoder-pilot/query_encoder
      - run.retrieval_index.doc_model=artifacts/retriever/medcpt-bi-encoder-pilot/doc_encoder
  graph_hybrid_medcpt_trained:
    retrieval: graph_hybrid_medcpt
    run_name: graph_hybrid_medcpt_trained
    base_retriever: hybrid
    overrides:
      - retrieval.query_model_name=artifacts/retriever/medcpt-bi-encoder-pilot/query_encoder
      - retrieval.doc_model_name=artifacts/retriever/medcpt-bi-encoder-pilot/doc_encoder
      - run.retrieval_index.query_model=artifacts/retriever/medcpt-bi-encoder-pilot/query_encoder
      - run.retrieval_index.doc_model=artifacts/retriever/medcpt-bi-encoder-pilot/doc_encoder
