# Root Hydra config
# Usage examples:
#   python -m medical_rag_reranker.commands train
#   python -m medical_rag_reranker.commands train --overrides '["train.max_epochs=2","train.batch_size=16"]'
#   python -m medical_rag_reranker.commands download_data
#
# You can also pass config_dir to point to another configs folder.

defaults:
  - data: data
  - model: model
  - train: train
  - logging: mlflow
  - jobs: jobs
  - paths@paths
  - retrieval: bm25
  - run@retrieval_run: retrieval_run
  - generation: generation
  - run@run.prep_data: prep_data
  - run@run.retrieval_index: retrieval_index
  - run@run.retriever_training_data: retriever_training_data
  - run@run.train_retriever: train_retriever
  - run@run.eval_retrieval: eval_retrieval
  - run@run.graph_benchmark: graph_benchmark
  - run@run.eval_generation: eval_generation
  - run@run.eval_reranked_retrieval: eval_reranked_retrieval
  - run@run.rag_demo: rag_demo
  - _self_
