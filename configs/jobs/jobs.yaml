enabled: true

# sync | broker
dispatch: ${oc.env:JOBS_DISPATCH,sync}

# file | postgres
storage: ${oc.env:JOBS_STORAGE,file}

# If true, submit_job immediately dispatches processing.
auto_dispatch: ${oc.decode:${oc.env:JOBS_AUTO_DISPATCH,true}}

# Base folder for persisted jobs/results.
store_dir: ${oc.env:JOBS_STORE_DIR,${paths.runs_dir}/jobs}

postgres:
  # Example:
  # dsn: postgresql+psycopg://user:password@127.0.0.1:5432/medical_rag
  dsn: ${oc.env:JOBS_POSTGRES_DSN,null}
  # If true, create tables automatically on runtime bootstrap.
  init_schema: ${oc.decode:${oc.env:JOBS_POSTGRES_INIT_SCHEMA,false}}
