services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: medical-rag-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      static:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: medical-rag-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: medical-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medical_rag}
      POSTGRES_USER: ${POSTGRES_USER:-medical_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medical_rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-medical_rag} -d ${POSTGRES_DB:-medical_rag}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  static:
    build:
      context: .
      dockerfile: docker/static/Dockerfile
    container_name: medical-rag-static
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-rag-app
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      JOBS_STORAGE: postgres
      JOBS_DISPATCH: broker
      JOBS_POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-medical_rag}:${POSTGRES_PASSWORD:-medical_rag}@postgres:5432/${POSTGRES_DB:-medical_rag}
      JOBS_POSTGRES_INIT_SCHEMA: "false"
      JOBS_AUTO_DISPATCH: "true"
      JOBS_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672//
      JOBS_BROKER_QUEUE: inference_jobs
      JOBS_BROKER_TASK_NAME: medical_rag_reranker.jobs.tasks.process_inference_job
      JOBS_API_PORT: "8000"
      JOBS_API_WORKERS: ${JOBS_API_WORKERS:-2}
      RETRIEVAL_VECTOR_BACKEND: ${RETRIEVAL_VECTOR_BACKEND:-local}
      RETRIEVAL_DENSE_BACKEND: ${RETRIEVAL_DENSE_BACKEND:-dense}
      QDRANT_URL: ${QDRANT_URL:-http://localhost:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-medical_rag_docs}
      QDRANT_TIMEOUT_SECONDS: ${QDRANT_TIMEOUT_SECONDS:-60}
      GENERATION_CORPUS_PATH: ${GENERATION_CORPUS_PATH:-/app/data/processed/corpus.jsonl}
      GENERATION_INDEX_PATH: ${GENERATION_INDEX_PATH:-/app/artifacts/bm25_index.json.gz}
      GENERATION_BACKEND: ${GENERATION_BACKEND:-local}
      GENERATION_LLM_MODEL_NAME: ${GENERATION_LLM_MODEL_NAME:-google/flan-t5-small}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      VLLM_API_TYPE: ${VLLM_API_TYPE:-chat}
      VLLM_TIMEOUT_SECONDS: ${VLLM_TIMEOUT_SECONDS:-120}
      LLM_JUDGE_BASE_URL: ${LLM_JUDGE_BASE_URL:-}
      LLM_JUDGE_MODEL: ${LLM_JUDGE_MODEL:-mistralai/Mistral-Small-3.2-24B-Instruct-2506}
      LLM_JUDGE_API_KEY: ${LLM_JUDGE_API_KEY:-}
      LLM_JUDGE_TIMEOUT_SECONDS: ${LLM_JUDGE_TIMEOUT_SECONDS:-300}
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./.hf_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      [
        "sh",
        "-c",
        "uvicorn medical_rag_reranker.asgi:app --host 0.0.0.0 --port 8000 --workers ${JOBS_API_WORKERS:-2}",
      ]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-rag-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      JOBS_STORAGE: postgres
      JOBS_DISPATCH: broker
      JOBS_POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-medical_rag}:${POSTGRES_PASSWORD:-medical_rag}@postgres:5432/${POSTGRES_DB:-medical_rag}
      JOBS_POSTGRES_INIT_SCHEMA: "false"
      JOBS_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672//
      JOBS_BROKER_QUEUE: inference_jobs
      JOBS_BROKER_TASK_NAME: medical_rag_reranker.jobs.tasks.process_inference_job
      RETRIEVAL_VECTOR_BACKEND: ${RETRIEVAL_VECTOR_BACKEND:-local}
      RETRIEVAL_DENSE_BACKEND: ${RETRIEVAL_DENSE_BACKEND:-dense}
      QDRANT_URL: ${QDRANT_URL:-http://localhost:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-medical_rag_docs}
      QDRANT_TIMEOUT_SECONDS: ${QDRANT_TIMEOUT_SECONDS:-60}
      GENERATION_CORPUS_PATH: ${GENERATION_CORPUS_PATH:-/app/data/processed/corpus.jsonl}
      GENERATION_INDEX_PATH: ${GENERATION_INDEX_PATH:-/app/artifacts/bm25_index.json.gz}
      GENERATION_BACKEND: ${GENERATION_BACKEND:-local}
      GENERATION_LLM_MODEL_NAME: ${GENERATION_LLM_MODEL_NAME:-google/flan-t5-small}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      VLLM_API_TYPE: ${VLLM_API_TYPE:-chat}
      VLLM_TIMEOUT_SECONDS: ${VLLM_TIMEOUT_SECONDS:-120}
      LLM_JUDGE_BASE_URL: ${LLM_JUDGE_BASE_URL:-}
      LLM_JUDGE_MODEL: ${LLM_JUDGE_MODEL:-mistralai/Mistral-Small-3.2-24B-Instruct-2506}
      LLM_JUDGE_API_KEY: ${LLM_JUDGE_API_KEY:-}
      LLM_JUDGE_TIMEOUT_SECONDS: ${LLM_JUDGE_TIMEOUT_SECONDS:-300}
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./.hf_cache:/app/.cache/huggingface
    command:
      [
        "sh",
        "-c",
        "celery -A medical_rag_reranker.jobs.tasks:celery_app worker --loglevel=info --queues=${JOBS_BROKER_QUEUE:-inference_jobs}",
      ]

volumes:
  postgres_data:
