services:
  postgres:
    image: postgres:16-alpine
    container_name: medical-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medical_rag}
      POSTGRES_USER: ${POSTGRES_USER:-medical_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medical_rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-medical_rag} -d ${POSTGRES_DB:-medical_rag}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-rag-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JOBS_STORAGE: postgres
      JOBS_POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-medical_rag}:${POSTGRES_PASSWORD:-medical_rag}@postgres:5432/${POSTGRES_DB:-medical_rag}
      JOBS_POSTGRES_INIT_SCHEMA: "false"
      JOBS_AUTO_DISPATCH: "true"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./.hf_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import medical_rag_reranker"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: ["sh", "-c", "while true; do sleep 3600; done"]

volumes:
  postgres_data:
