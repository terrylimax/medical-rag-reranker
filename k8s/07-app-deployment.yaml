apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: medical-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: medical-rag-app:local
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - uvicorn medical_rag_reranker.asgi:app --host 0.0.0.0 --port 8000 --workers ${JOBS_API_WORKERS:-2}
          envFrom:
            - configMapRef:
                name: medical-rag-config
            - secretRef:
                name: medical-rag-secrets
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
