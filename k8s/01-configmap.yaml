apiVersion: v1
kind: ConfigMap
metadata:
  name: medical-rag-config
  namespace: medical-rag
data:
  POSTGRES_DB: medical_rag
  POSTGRES_USER: medical_rag
  POSTGRESQL_DATABASE: medical_rag
  POSTGRESQL_USERNAME: medical_rag
  POSTGRESQL_REPLICATION_USER: repl_user
  RABBITMQ_USER: guest
  JOBS_STORAGE: postgres
  JOBS_DISPATCH: broker
  JOBS_AUTO_DISPATCH: "true"
  JOBS_POSTGRES_INIT_SCHEMA: "false"
  JOBS_BROKER_QUEUE: inference_jobs
  JOBS_BROKER_TASK_NAME: medical_rag_reranker.jobs.tasks.process_inference_job
  JOBS_API_PORT: "8000"
  JOBS_API_WORKERS: "2"
  RETRIEVAL_VECTOR_BACKEND: local
  RETRIEVAL_DENSE_BACKEND: dense
  QDRANT_URL: http://localhost:6333
  QDRANT_COLLECTION: medical_rag_docs
  QDRANT_TIMEOUT_SECONDS: "60"
  GENERATION_CORPUS_PATH: /app/medical_rag_reranker/demo_assets/corpus.jsonl
  GENERATION_INDEX_PATH: /app/medical_rag_reranker/demo_assets/bm25_index.json
  GENERATION_BACKEND: local
  GENERATION_LLM_MODEL_NAME: google/flan-t5-small
  VLLM_BASE_URL: ""
  VLLM_API_TYPE: chat
  VLLM_TIMEOUT_SECONDS: "120"
  LLM_JUDGE_BASE_URL: ""
  LLM_JUDGE_MODEL: mistralai/Mistral-Small-3.2-24B-Instruct-2506
  LLM_JUDGE_TIMEOUT_SECONDS: "300"
