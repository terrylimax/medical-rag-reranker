apiVersion: v1
kind: Secret
metadata:
  name: regcred
  namespace: medical-rag
type: kubernetes.io/dockerconfigjson
stringData:
  # Placeholder secret for local Minikube flow.
  # It keeps `imagePullSecrets` wiring valid even when images are built directly
  # into Minikube with `minikube image build`.
  #
  # Replace this secret with a real one for private registries:
  # kubectl -n medical-rag delete secret regcred
  # kubectl -n medical-rag create secret docker-registry regcred \
  #   --docker-server=<registry> \
  #   --docker-username=<user> \
  #   --docker-password=<password> \
  #   --docker-email=<email>
  .dockerconfigjson: |
    {"auths":{}}
