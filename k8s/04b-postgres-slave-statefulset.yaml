apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-slave
  namespace: medical-rag
spec:
  serviceName: postgres-slave-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres-slave
  template:
    metadata:
      labels:
        app: postgres-slave
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: postgres-slave
          image: docker.io/bitnamilegacy/postgresql:17.6.0-debian-12-r4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRESQL_REPLICATION_MODE
              value: slave
            - name: POSTGRESQL_REPLICATION_USER
              valueFrom:
                configMapKeyRef:
                  name: medical-rag-config
                  key: POSTGRESQL_REPLICATION_USER
            - name: POSTGRESQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medical-rag-secrets
                  key: POSTGRESQL_REPLICATION_PASSWORD
            - name: POSTGRESQL_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: medical-rag-config
                  key: POSTGRESQL_USERNAME
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medical-rag-secrets
                  key: POSTGRESQL_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: medical-rag-config
                  key: POSTGRESQL_DATABASE
            - name: POSTGRESQL_MASTER_HOST
              value: postgres
            - name: POSTGRESQL_MASTER_PORT_NUMBER
              value: "5432"
            - name: POSTGRESQL_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medical-rag-secrets
                  key: POSTGRESQL_POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRESQL_USERNAME" -d "$POSTGRESQL_DATABASE"
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRESQL_USERNAME" -d "$POSTGRESQL_DATABASE"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: postgres-data
              mountPath: /bitnami/postgresql
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
